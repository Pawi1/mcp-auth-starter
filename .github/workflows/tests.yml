name: Tests

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: pytest -v
